<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>

  <!-- Clock outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#2dd4bf" stroke-width="18"/>

  <!-- 12 o'clock tick mark -->
  <line x1="256" y1="80" x2="256" y2="108" stroke="#2dd4bf" stroke-width="12" stroke-linecap="round"/>

  <!-- Hour hand (~10 o'clock position) -->
  <line x1="256" y1="256" x2="163" y2="175" stroke="#2dd4bf" stroke-width="16" stroke-linecap="round"/>

  <!-- Minute hand (~2 o'clock position) -->
  <line x1="256" y1="256" x2="330" y2="168" stroke="#2dd4bf" stroke-width="11" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#2dd4bf"/>

  <!-- Center dot inner -->
  <circle cx="256" cy="256" r="6" fill="#0d1117"/>
</svg>
